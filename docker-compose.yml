version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: csp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-csp_db}
      POSTGRES_USER: ${POSTGRES_USER:-csp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csp_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csp_user} -d ${POSTGRES_DB:-csp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - csp_network

  redis:
    image: redis:7-alpine
    container_name: csp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-csp_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-csp_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - csp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: csp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-csp_user}:${POSTGRES_PASSWORD:-csp_password}@postgres:5432/${POSTGRES_DB:-csp_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-csp_redis_password}@redis:6379/0
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - csp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: csp_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - csp_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  csp_network:
    driver: bridge
