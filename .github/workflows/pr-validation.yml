name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── 1. Backend lint + type-check ──────────────────────────────
  backend-quality:
    name: "Backend: Lint & Type-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type-check
        run: mypy app/

  # ── 2. Frontend lint + type-check ────────────────────────────
  frontend-quality:
    name: "Frontend: Lint & Type-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run type-check

  # ── 3. Backend unit tests ─────────────────────────────────────
  backend-unit:
    name: "Backend: Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost:5432/dummy
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: pr-unit-test-secret-key-at-least-32-chars
          ENVIRONMENT: test
          DEBUG: "false"
          GEMINI_API_KEY: "pr-unit-test-key"
        run: pytest tests/unit/ -v --tb=short -q

  # ── 4. Backend integration tests ─────────────────────────────
  backend-integration:
    name: "Backend: Integration Tests + Coverage"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: pr-integration-test-secret-key-not-for-prod
          ENVIRONMENT: test
          DEBUG: "false"
          GEMINI_API_KEY: "pr-integration-test-key"
        run: |
          pytest tests/ \
            --ignore=tests/unit \
            -v --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend-pr
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-pr-${{ github.event.pull_request.number }}
          path: backend/coverage.xml
          retention-days: 7

  # ── 5. Frontend tests ─────────────────────────────────────────
  frontend-test:
    name: "Frontend: Jest Tests + Coverage"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend-pr
        continue-on-error: true

  # ── 6. Playwright E2E ─────────────────────────────────────────
  e2e:
    name: "E2E: Playwright (Chromium)"
    runs-on: ubuntu-latest
    needs: [backend-integration, frontend-test]
    # Non-blocking on PRs — informational only
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: e2e_db
          POSTGRES_USER: e2e_user
          POSTGRES_PASSWORD: e2e_password
        options: >-
          --health-cmd "pg_isready -U e2e_user -d e2e_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://e2e_user:e2e_password@localhost:5432/e2e_db
          SECRET_KEY: e2e-pr-secret-key-not-for-production-use
        run: alembic upgrade head

      - name: Start backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://e2e_user:e2e_password@localhost:5432/e2e_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: e2e-pr-secret-key-not-for-production-use
          ENVIRONMENT: test
          DEBUG: "false"
          GEMINI_API_KEY: "e2e-pr-test-key"
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Start frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm start &

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for services
        run: |
          npx wait-on \
            http://localhost:8000/api/v1/liveness \
            http://localhost:3000 \
            --timeout 60000

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test --project=chromium --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

  # ── 7. PR summary ─────────────────────────────────────────────
  pr-checks-passed:
    name: "All PR Checks"
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
      - backend-unit
      - backend-integration
      - frontend-test
    steps:
      - name: All required checks passed
        run: echo "All required PR checks passed."
