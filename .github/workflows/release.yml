name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0, v1.2.3

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Validate tag format and extract version ────────────────
  validate:
    name: "Release: Validate tag"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Confirm tag points to main
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base HEAD origin/main)
          if [ "$MERGE_BASE" != "$(git rev-parse HEAD)" ]; then
            echo "::error::Release tag must point to a commit on main branch."
            exit 1
          fi

  # ── 2. Build and push versioned Docker images ─────────────────
  build-and-push:
    name: "Release: Build Docker images"
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend:${{ needs.validate.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend:latest
          labels: |
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-frontend:${{ needs.validate.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-frontend:latest
          labels: |
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build release artifact (source tarball) ────────────────
  build-artifact:
    name: "Release: Create source artifact"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          ARCHIVE="csp-v${VERSION}.tar.gz"

          tar -czf "${ARCHIVE}" \
            --exclude='.git' \
            --exclude='**/__pycache__' \
            --exclude='**/.pytest_cache' \
            --exclude='**/node_modules' \
            --exclude='**/.next' \
            --exclude='backend/.venv' \
            --exclude='**/*.pyc' \
            .

          echo "Created ${ARCHIVE} ($(du -sh "${ARCHIVE}" | cut -f1))"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: csp-v${{ needs.validate.outputs.version }}
          path: csp-v${{ needs.validate.outputs.version }}.tar.gz
          retention-days: 90

  # ── 4. Generate build metadata ────────────────────────────────
  build-metadata:
    name: "Release: Generate metadata"
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || echo "")

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          COMMITS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges | head -50)

          {
            echo "changelog<<EOF"
            echo "## What's Changed in v${VERSION}"
            echo ""
            echo "${COMMITS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write metadata file
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cat > build-metadata.json <<EOF
          {
            "version": "${VERSION}",
            "commit": "${{ github.sha }}",
            "tag": "${{ github.ref_name }}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "actor": "${{ github.actor }}",
            "backend_image": "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend:${VERSION}",
            "frontend_image": "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-frontend:${VERSION}"
          }
          EOF
          cat build-metadata.json

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-v${{ needs.validate.outputs.version }}
          path: build-metadata.json
          retention-days: 90

  # ── 5. Create GitHub Release ──────────────────────────────────
  github-release:
    name: "Release: Publish GitHub Release"
    runs-on: ubuntu-latest
    needs: [validate, build-and-push, build-artifact, build-metadata]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "csp-v${{ needs.validate.outputs.version }}"
          merge-multiple: true

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          pattern: "build-metadata-v${{ needs.validate.outputs.version }}"
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || echo "")

          {
            echo "notes<<NOTES_EOF"
            echo "## AI-Powered Customer Success Platform v${VERSION}"
            echo ""
            echo "### Docker Images"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend:${VERSION}"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-frontend:${VERSION}"
            echo '```'
            echo ""
            echo "### Deployment"
            echo '```bash'
            echo "# Download the source archive, configure .env files, then:"
            echo "docker compose -f deployment/docker-compose.production.yml up -d"
            echo "docker compose -f deployment/docker-compose.production.yml exec backend alembic upgrade head"
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Commits since ${PREV_TAG}"
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -50
            fi
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ needs.validate.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          files: |
            csp-v${{ needs.validate.outputs.version }}.tar.gz
            build-metadata.json
