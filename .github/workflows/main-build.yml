name: Main Branch Build

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Backend Docker image ───────────────────────────────────
  build-backend:
    name: "Build: Backend Docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Frontend Docker image ──────────────────────────────────
  build-frontend:
    name: "Build: Frontend Docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-frontend
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Verify Docker Compose ──────────────────────────────────
  verify-compose:
    name: "Verify: Docker Compose config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate production compose syntax
        run: |
          # Set required env vars for validation (dummy values)
          export POSTGRES_DB=test_db POSTGRES_USER=test_user POSTGRES_PASSWORD=test_pw
          export REDIS_PASSWORD=test_redis SECRET_KEY=test-key-for-compose-validation-only
          export ALLOWED_ORIGINS='["http://localhost:3000"]' GEMINI_API_KEY=test
          export POSTGRES_DATA_PATH=/tmp/pg REDIS_DATA_PATH=/tmp/redis
          docker compose -f deployment/docker-compose.production.yml config --quiet

  # ── 4. Smoke test the built images ───────────────────────────
  smoke-test:
    name: "Smoke: Test built images"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_password
        options: >-
          --health-cmd "pg_isready -U smoke_user -d smoke_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://smoke_user:smoke_password@localhost:5432/smoke_db
          SECRET_KEY: smoke-test-secret-key-not-for-production
        run: alembic upgrade head

      - name: Start backend (production image)
        run: |
          docker run -d \
            --name smoke-backend \
            --network host \
            -e DATABASE_URL="postgresql+asyncpg://smoke_user:smoke_password@localhost:5432/smoke_db" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e SECRET_KEY="smoke-test-secret-key-not-for-production" \
            -e ENVIRONMENT="production" \
            -e GEMINI_API_KEY="smoke-test-key" \
            -e ALLOWED_ORIGINS='["http://localhost:3000"]' \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/csp-backend:latest

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/liveness && break
            sleep 2
          done

      - name: Check liveness
        run: curl -sf http://localhost:8000/api/v1/liveness | jq .alive

      - name: Check health
        run: curl -sf http://localhost:8000/api/v1/health | jq .status

  # ── 5. Upload build summary ───────────────────────────────────
  build-summary:
    name: "Summary: Build metadata"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, verify-compose, smoke-test]
    steps:
      - name: Write build summary
        run: |
          echo "## Main Branch Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend   | ✅     | \`${{ needs.build-backend.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend  | ✅     | \`${{ needs.build-frontend.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
