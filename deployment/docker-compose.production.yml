# ============================================================
# Production Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env          # then fill in real secrets
#   docker compose -f deployment/docker-compose.production.yml up -d
#   docker compose -f deployment/docker-compose.production.yml exec backend alembic upgrade head
#
# Prerequisites:
#   - Real SECRET_KEY (min 32 chars, random)
#   - Real POSTGRES_PASSWORD and REDIS_PASSWORD
#   - Real GEMINI_API_KEY
#   - ALLOWED_ORIGINS set to your production domain(s)
# ============================================================

version: "3.9"

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &json-logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: csp_postgres_prod
    <<: [*restart-policy, *json-logging]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Tune for production workload
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - csp_internal
    # No external port exposure in production — only internal network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: csp_redis_prod
    <<: [*restart-policy, *json-logging]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - csp_internal

  # ── Backend ──────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-csp-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: csp_backend_prod
    <<: [*restart-policy, *json-logging]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      APP_NAME: ${APP_NAME:-Customer Success Platform API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - csp_internal
      - csp_external

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-csp-frontend:latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    container_name: csp_frontend_prod
    <<: [*restart-policy, *json-logging]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Customer Success Platform}
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.0.0}
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - csp_internal
      - csp_external

  # ── Nginx reverse proxy ───────────────────────────────────────
  # Terminates TLS, routes /api/* to backend, /* to frontend.
  # Replace the self-signed cert with a real one (Let's Encrypt recommended).
  nginx:
    image: nginx:1.27-alpine
    container_name: csp_nginx_prod
    <<: [*restart-policy, *json-logging]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - csp_external

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/csp/postgres}
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-/var/lib/csp/redis}

networks:
  csp_internal:
    driver: bridge
    internal: true        # backend ↔ DB/Redis, not reachable from host
  csp_external:
    driver: bridge        # nginx ↔ backend ↔ frontend
